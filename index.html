<center>
     <h1><strong>Contact Us</strong></h1>

     <strong>
    <form action="submit_form.php" method="POST">


        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="Enter your name">
        <br><br>


          <p>Please select your preferred contact method:</p>
        <input type="radio" id="email" name="contact_method" value="email" required>
        <label for="email_contact">Email</label> 
        <br>


        <input type="radio" id="phone" name="contact_method" value="phone">
        <label for="phone_contact">Phone</label>
        <br><br>


        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
    
        <br><br>
         <label for="Phone number">Phone:</label>
         <input type="tel" id="Phone number" name="phone" required placeholder="Enter your phone number">

         <br><br>


        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="30" required placeholder="Enter your message"></textarea>
        <br><br>


        <input type="submit" value="Submit">
    </form>
    </strong>
